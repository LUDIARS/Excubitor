# Excubitor v0.1 service catalog
#
# 本ファイルが source of truth。 起動時 / file watch で DB の services テーブルに
# snapshot として格納する。

services:
  # ─────────────── LUDIARS 共有インフラ (monitor_only) ───────────────
  - code: infra-postgres
    name: infra Postgres
    project_code: infra
    component: postgres
    port: 5432
    monitor_only: true
    repo: LUDIARS/infra
    runtime: docker-compose
    compose_file: E:/Document/Ars/infra/docker-compose.yaml
    services: [postgres]
    container_names: [infra-postgres-1]
    autostart: false

  - code: infra-redis
    name: infra Redis
    project_code: infra
    component: redis
    port: 6379
    monitor_only: true
    repo: LUDIARS/infra
    runtime: docker-compose
    compose_file: E:/Document/Ars/infra/docker-compose.yaml
    services: [redis]
    container_names: [infra-redis-1]
