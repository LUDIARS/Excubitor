  # ─────────────── Cernere (認証基盤) ───────────────
  - code: cernere-backend-dev
    name: Cernere backend
    project_code: cernere
    component: backend
    port: 8080
    repo: LUDIARS/Cernere
    runtime: docker-compose
    compose_file: E:/Document/Ars/Cernere/docker-compose.yaml
    services: [backend-dev]
    container_names: [cernere-backend-dev]
    autostart: false
    health:
      type: http
      url: http://localhost:8080/health
      interval_sec: 30
    infisical:
      project_id: 19c9e77d-646c-4a0e-a091-b494234953ea
      environment: dev
      inject: true
    auto_fix:
      enabled: false  # pnpm v10 構成のハマりで暴走中、 手動で main を安定化させてから再有効化
      agent: claude-code
      max_auto_attempts: 3
      working_dir: E:/Document/Ars/Cernere
      branch_prefix: excubitor/auto-fix/
      create_pr: true
      pr_draft: true

  - code: cernere-frontend-dev
    name: Cernere frontend
    project_code: cernere
    component: frontend
    port: 5173
    repo: LUDIARS/Cernere
    runtime: docker-compose
    compose_file: E:/Document/Ars/Cernere/docker-compose.yaml
    services: [frontend-dev]
    container_names: [cernere-frontend-dev]
    autostart: false
    health:
      type: http
      url: http://localhost:5173
    infisical:
      project_id: 19c9e77d-646c-4a0e-a091-b494234953ea
      environment: dev
      inject: true
      interval_sec: 30

  # ─────────────── Custos (リモートテストランナー) ───────────────
  - code: custos
    name: Custos
    project_code: custos
    component: server
    port: 8765
    repo: LUDIARS/Custos
    runtime: dev-process-md
    cwd: E:/Document/Ars/Custos
    autostart: false
    health:
      type: http
      url: http://localhost:8765/health
      interval_sec: 30

  # ─────────────── Memoria (Web ブクマ + RAG + 日記) ───────────────
  # 個人ローカル開発用 server (runtime: node、 port 5180)。
  - code: memoria-server
    name: Memoria server (local)
    project_code: memoria
    component: server
    port: 5180
    repo: LUDIARS/Memoria
    runtime: node
    cwd: E:/Document/Ars/Memoria/server
    command: npm run dev
    autostart: false
    health:
      type: http
      url: http://localhost:5180/api/health
