# Excubitor v0.1 service catalog
#
# 本ファイルが source of truth。 起動時 / file watch で DB の services テーブルに
# snapshot として格納する。
#
# tier (デプロイ/挙動クラス) — ローカルアプリ と SaaS で Excubitor の扱いを分ける軸:
#   saas      : 多人数向けにデプロイするバックエンド Web サービス (SaaS ランチャーが管理)
#   infra     : LUDIARS 共有インフラ (infra/ リポの DB / queue / object store 等)
#   personal  : 本人の PC でのみ動く単独利用ツール (Memoria local / Concordia 等)
#   local-app : ネイティブ/デスクトップ製品 (runtime=app)
# SaaS ランチャーは tier: saas (+依存 infra) を既定対象にする。
#
# 命名: フロントエンドは Corpus 側へ統合するため catalog からは除外し (フロント統合=Corpus)、
# バックエンド単独になった論理サービスは管理名から "-backend" 等の役割サフィックスを外して
# 純粋なプロジェクト名 (code=プロジェクトコード / name=プロジェクト名) を採用する。

global:
  env:
    # *.melpot.dev を全サービスの Vite dev server allowedHosts に一括許可。
    # LUDIARS_ALLOWED_HOSTS を読む全サービス (Actio/Cernere/Nuntius/Schedula/Excubitor/
    # Pagus/Signum/Praeforma/Peregrinatio) に自動注入される。
    LUDIARS_ALLOWED_HOSTS: ".melpot.dev"

services:
  # ─────────────── LUDIARS 共有インフラ (tier: infra / monitor_only) ───────────────
  - code: infra-postgres
    name: infra Postgres
    tier: infra
    project_code: infra
    component: postgres
    port: 5432
    monitor_only: true
    repo: LUDIARS/infra
    runtime: docker-compose
    compose_file: E:/Document/Ars/infra/docker-compose.yaml
    services: [postgres]
    container_names: [infra-postgres-1]
    autostart: false

  - code: infra-redis
    name: infra Redis
    tier: infra
    project_code: infra
    component: redis
    port: 6379
    monitor_only: true
    repo: LUDIARS/infra
    runtime: docker-compose
    compose_file: E:/Document/Ars/infra/docker-compose.yaml
    services: [redis]
    container_names: [infra-redis-1]
    autostart: false

  - code: infra-minio
    name: infra MinIO
    tier: infra
    project_code: infra
    component: minio
    port: 9000
    monitor_only: true
    repo: LUDIARS/infra
    runtime: docker-compose
    compose_file: E:/Document/Ars/infra/docker-compose.yaml
    services: [minio]
    container_names: [infra-minio-1]
    autostart: false

  - code: infra-mailpit
    name: infra Mailpit
    tier: infra
    project_code: infra
    component: mailpit
    port: 8025
    monitor_only: true
    repo: LUDIARS/infra
    runtime: docker-compose
    compose_file: E:/Document/Ars/infra/docker-compose.yaml
    services: [mailpit]
    container_names: [infra-mailpit-1]
    autostart: false

  # ─────────────── SaaS バックエンド (tier: saas) ───────────────
  # フロントエンドは Corpus 統合のため除外。 バックエンド単独なので code/name は純粋名。
  - code: cernere
    name: Cernere
    tier: saas
    project_code: cernere
    component: backend
    port: 8080
    repo: LUDIARS/Cernere
    runtime: docker-compose
    compose_file: E:/Document/Ars/Cernere/docker-compose.yaml
    services: [backend-dev]
    container_names: [cernere-backend-dev]
    autostart: false
    health:
      type: http
      url: http://localhost:8080/health
      interval_sec: 30
    infisical:
      project_id: 19c9e77d-646c-4a0e-a091-b494234953ea
      environment: dev
      inject: true
    # 全サービスへ配る Cernere の接続先 (URL/port は Excubitor が特定可能 → 各サービスの個別設定不要)。
    provides:
      CERNERE_URL: http://${host}:${port}
      CERNERE_BASE_URL: http://${host}:${port}
      CERNERE_WS_URL: ws://${host}:${port}
    auto_fix:
      enabled: false  # pnpm v10 構成のハマりで暴走中、 手動で main を安定化させてから再有効化
      agent: claude-code
      max_auto_attempts: 3
      working_dir: E:/Document/Ars/Cernere
      branch_prefix: excubitor/auto-fix/
      create_pr: true
      pr_draft: true

  - code: actio
    name: Actio
    tier: saas
    project_code: actio
    component: backend
    port: 3000
    repo: LUDIARS/Actio
    runtime: docker-compose
    compose_file: E:/Document/Ars/Actio/docker-compose.yaml
    services: [backend]
    container_names: [actio-backend-1]
    autostart: false
    health:
      type: http
      url: http://localhost:3000/api/health
      interval_sec: 30
    provides:
      ACTIO_URL: http://${host}:${port}

  # ─────────────── Imperativus (音声コマンドルーター + Iv) ───────────────
  - code: imperativus-app
    name: Imperativus app
    tier: saas
    project_code: imperativus
    component: app
    port: 5963
    repo: LUDIARS/Imperativus
    runtime: docker-compose
    compose_file: E:/Document/Ars/Imperativus/docker-compose.yaml
    services: [app]
    container_names: [imperativus-app]
    autostart: false
    health:
      type: http
      url: http://localhost:5963/health
      interval_sec: 30
    provides:
