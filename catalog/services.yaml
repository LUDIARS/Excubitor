    tier: local-app
    project_code: legatus
    component: app
    repo: LUDIARS/Legatus
    runtime: app
    app_kind: electron
    # package.json "start": "electron dist/electron/main.js"
    # build:electron → dist/electron/main.js (tsconfig.electron.json)
    exec: E:/Document/Ars/Legatus/node_modules/electron/dist/electron.exe
    exec_args:
      - dist/electron/main.js
    cwd: E:/Document/Ars/Legatus
    build_command: npm run build
    # process_match は省略 — electron.exe は汎用名のため Excubitor spawn 追跡のみ
    autostart: false
    health:
      type: process
      interval_sec: 30

# ─────────────── メモリ監視 (memory_monitor) ───────────────
# 各サービスの RSS (プロセスツリー合算 / docker stats) を時系列で採取し、 単調増加トレンドを
# leak として error_tasks に起票する。 WSL2 バックエンドは distro 内部 + Windows 側 vmmem を別軸で監視。
# per-service の閾値は各サービスの memory: ブロックで上書きできる (既定 60 分窓 / 50MB/h)。
memory_monitor:
  enabled: true
  interval_sec: 60        # サンプリング間隔
  retention_hours: 48     # memory_samples の保持期間 (これより古い行は剪定)
  wsl:
    enabled: true
    distros: []           # 空 = `wsl -l -q` で自動検出 (docker-desktop 系は除外)
    leak_window_min: 120
    leak_threshold_mb_per_hr: 200
