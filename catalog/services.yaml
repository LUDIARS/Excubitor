    container_names: [imperativus-mosquitto]
    autostart: false

  # ─────────────── Nuntius (統合通知・メッセージング基盤) ───────────────
  - code: nuntius-api
    name: Nuntius API
    tier: saas
    project_code: nuntius
    component: api
    port: 3100
    repo: LUDIARS/Nuntius
    runtime: docker-compose
    compose_file: E:/Document/Ars/Nuntius/docker-compose.yaml
    services: [api]
    container_names: [nuntius-api-1]
    autostart: false
    health:
      type: http
      url: http://localhost:3100/api/health
      interval_sec: 30
    provides:
      NUNTIUS_URL: http://${host}:${port}
      NUNTIUS_API_URL: http://${host}:${port}

  - code: nuntius-worker
    name: Nuntius Worker
    tier: saas
    project_code: nuntius
    component: worker
    repo: LUDIARS/Nuntius
    runtime: docker-compose
    compose_file: E:/Document/Ars/Nuntius/docker-compose.yaml
    services: [worker]
    container_names: [nuntius-worker-1]
    autostart: false

  # ─────────────── Memoria Hub (シェアサーバ / SaaS) ───────────────
  # server/multi/docker-compose.yml で Postgres + Hub を起動。 host port 5280。
  # ローカル開発 server (個人ログ専用) は tier: personal (下段)。
  - code: memoria-hub
    name: Memoria Hub
    tier: saas
    project_code: memoria
    component: hub
    port: 5280
    repo: LUDIARS/Memoria
    runtime: docker-compose
    compose_file: E:/Document/Ars/Memoria/server/multi/docker-compose.yml
    services: [hub]
    container_names: [multi-hub-1]
    autostart: false
    health:
      type: http
      url: http://localhost:5280/healthz
      interval_sec: 30
    provides:
      MEMORIA_HUB_URL: http://${host}:${port}

  - code: memoria-hub-pg
    name: Memoria Hub Postgres
    tier: saas
    project_code: memoria
    component: hub-pg
    monitor_only: true
    repo: LUDIARS/Memoria
    runtime: docker-compose
    compose_file: E:/Document/Ars/Memoria/server/multi/docker-compose.yml
    services: [postgres]
    container_names: [multi-postgres-1]
    autostart: false

  # ─────────────── dev.ps1 ローカル開発サービス群 (設計書 §6.1) ───────────────
  # dev.bat / dev.ps1 が `cd <repo> && npm run dev` で別ウィンドウ起動している
  # 開発サーバを catalog に全登録する。Excubitor が dev.bat を置き換える布石。
  # command は各リポ自身の `npm run dev` に委譲。 health は port への tcp probe。

  - code: corpus
    name: Corpus (Hub framework)
    tier: saas
    project_code: corpus
    component: server
    port: 5185
    repo: LUDIARS/Corpus
    runtime: node
    cwd: E:/Document/Ars/Corpus
    command: npm run dev
    autostart: false
    health:
      type: tcp
      interval_sec: 30
    provides:
      CORPUS_URL: http://${host}:${port}

  - code: schedula
    name: Schedula (予定基盤)
    tier: saas
    project_code: schedula
    component: backend
    # Actio (3000) と port 競合するため 3300 へ移設。Schedula は BACKEND_PORT ?? PORT ?? 3000 を
    # 読む (src/index.ts) ので env: で BACKEND_PORT=3300 を spawn env に注入して別ポートで bind させる。
    port: 3300
    repo: LUDIARS/Schedula
    runtime: node
    cwd: E:/Document/Ars/Schedula
    command: npm run dev
    env:
      BACKEND_PORT: "3300"
    autostart: false
    health:
      type: tcp
      interval_sec: 30
    provides:
      SCHEDULA_URL: http://${host}:${port}

  - code: pagus
    name: Pagus (AI 村シミュレーション)
    tier: personal
    project_code: pagus
    component: backend
    # 権威サーバ (WS :4310)。client (:4320) は frontend のため catalog 対象外。
    port: 4310
    repo: LUDIARS/Pagus
    runtime: node
    cwd: E:/Document/Ars/Pagus
    command: npm run dev
    # start-pagus.bat: stale :4310/:4320 を解放 → server(WS) + client を起動 (PAGUS_BRAIN=llm)。
    start_script: E:/Document/Ars/start-pagus.bat
    autostart: false
    health:
      type: tcp
      interval_sec: 30
    provides:
      PAGUS_WS_URL: ws://${host}:${port}

  - code: peregrinatio
    name: Peregrinatio
    tier: personal
    project_code: peregrinatio
    component: backend
    port: 8090
    repo: LUDIARS/Peregrinatio
    runtime: node
    cwd: E:/Document/Ars/Peregrinatio
    command: npm run dev
    # start-peregrinatio.bat: stale :8090 を解放 → web を single-origin dist にビルドして :8090 で配信。
    start_script: E:/Document/Ars/start-peregrinatio.bat
    autostart: false
    health:
      type: tcp
      interval_sec: 30
    provides:
      PEREGRINATIO_URL: http://${host}:${port}

  - code: aedilis
    name: Aedilis (施設予約)
    tier: saas
    project_code: aedilis
    component: server
    port: 17502
    repo: LUDIARS/Aedilis
    runtime: node
    cwd: E:/Document/Ars/Aedilis
    command: npm run dev
    autostart: false
    health:
      type: tcp
      interval_sec: 30
    provides:
      AEDILIS_URL: http://${host}:${port}

  - code: bibliotheca
    name: Bibliotheca (貸出台帳)
    tier: saas
    project_code: bibliotheca
    component: server
    port: 17501
    repo: LUDIARS/Bibliotheca
    runtime: node
    cwd: E:/Document/Ars/Bibliotheca
    command: npm run dev
    start_script: E:/Document/Ars/start-bibliotheca.bat
    autostart: false
    health:
      type: tcp
      interval_sec: 30
    provides:
      BIBLIOTHECA_URL: http://${host}:${port}

  - code: quaestor
    name: Quaestor (個人会計)
    tier: personal
    project_code: quaestor
    component: backend
    port: 17400
    repo: LUDIARS/Quaestor
    runtime: node
    cwd: E:/Document/Ars/Quaestor
    command: npm run dev
    start_script: E:/Document/Ars/start-quaestor.bat
    autostart: false
    health:
      type: tcp
      interval_sec: 30
    provides:
      QUAESTOR_URL: http://${host}:${port}

  - code: praeforma
    name: Praeforma (仕様↔実装)
    tier: saas
    project_code: praeforma
    component: backend
    port: 8889
    repo: LUDIARS/Praeforma
    runtime: node
    cwd: E:/Document/Ars/Praeforma
    command: npm run dev
    autostart: false
    health:
      type: tcp
      interval_sec: 30
    provides:
      PRAEFORMA_URL: http://${host}:${port}
      PRAEFORMA_API_URL: http://${host}:${port}

  - code: praeforma-web
    name: Praeforma Web (wireframe editor)
    tier: saas
    project_code: praeforma
    component: frontend
    port: 5177
    repo: LUDIARS/Praeforma
    runtime: node
    cwd: E:/Document/Ars/Praeforma
    command: npm run dev:web
    autostart: false
    health:
      type: tcp
      interval_sec: 30
    provides:
      PRAEFORMA_WEB_URL: http://${host}:${port}

  - code: signum
    name: Signum (コンテンツ署名)
    tier: saas
    project_code: signum
    component: backend
    port: 3200
    repo: LUDIARS/Signum
    runtime: node
    cwd: E:/Document/Ars/Signum
    command: npm run dev
    autostart: false
    health:
      type: tcp
      interval_sec: 30
    provides:
      SIGNUM_URL: http://${host}:${port}

  - code: ludellus
    name: Ludellus server (知育)
    tier: saas
    project_code: ludellus
    component: server
    port: 5380
    repo: LUDIARS/Ludellus-Server
    runtime: node
    cwd: E:/Document/Ars/Ludellus-Server
    command: npm run dev
    autostart: false
    health:
      type: tcp
      interval_sec: 30
    provides:
      LUDELLUS_URL: http://${host}:${port}

  - code: vantanhub
    name: VantanHub (学校 hub)
    tier: saas
    project_code: vantanhub
    component: server
    port: 5186
    repo: LUDIARS/VantanHub
    runtime: node
    cwd: E:/Document/Ars/VantanHub
    command: npm run dev
    # 学校生活 hub はフロントを Corpus 経由で統合する → 起動セットに含めると Corpus も自動起動。
    uses_corpus: true
    autostart: false
    health:
      type: tcp
      interval_sec: 30
    provides:
      VANTANHUB_URL: http://${host}:${port}

  # ─────────────── Tirocinium (面接練習) ───────────────
  - code: tirocinium
    name: Tirocinium server (面接練習)
    tier: saas
    project_code: tirocinium
    component: server
    port: 8084
    repo: LUDIARS/Tirocinium
    runtime: node
    cwd: E:/Document/Ars/Tirocinium
    command: npm run dev:server
    # start-tirocinium.bat は server(8084)+desktop(5178) を 1 プロセスツリーで起動 + port 掃除。
    start_script: E:/Document/Ars/start-tirocinium.bat
    autostart: false
    health:
      type: http
      url: http://localhost:8084/health
      interval_sec: 30
    # secret-agent が tirocinium サービスの secret を解決するための Infisical マッピング。
    # 値の実体は Infisical (infisical.vtn-game.com) の本プロジェクトに置く。 dev は
    # claude CLI バックエンド (TIROCINIUM_LLM_BACKEND=cli) で API キー不要。
    infisical:
      project_id: 798d69f4-18a1-4a8a-8e53-4e663748caa6
      environment: dev
      inject: true
    provides:
      TIROCINIUM_URL: http://${host}:${port}

  # ─────────────── Discutere (Discord 自走議論) ───────────────
  # port は Nuntius (3100) と競合するため 3110 へ退避。 サービス側は BACKEND_PORT を
  # 読むので、 Excubitor が起動時に env: BACKEND_PORT=3110 を注入して整合させる。
  - code: discutere
    name: Discutere (Discord 議論)
    tier: saas
    project_code: discutere
    component: backend
    port: 3110
    repo: LUDIARS/Discutere
    runtime: node
    cwd: E:/Document/Ars/Discutere
    command: npm run dev:server
    # start-discutere.bat を使う。 BACKEND_PORT=3110 は env: で spawn env に注入され、
    # bat → npm → node が継承するので bat 自身が 3100 を書いていても 3110 で上がる。
    start_script: E:/Document/Ars/start-discutere.bat
    autostart: false
    env:
      BACKEND_PORT: "3110"
    health:
      type: http
      url: http://localhost:3110/health
      interval_sec: 30
    provides:
      DISCUTERE_URL: http://${host}:${port}

  # ─────────────── personal (本人 PC 専用ツール / tier: personal) ───────────────
  # 個人ローカル開発用 server (個人ログ専用、 port 5180)。 シェアサーバ (Hub) とは別。
  - code: memoria-server
    name: Memoria server (local)
    tier: personal
    project_code: memoria
    component: server
    port: 5180
    repo: LUDIARS/Memoria
    runtime: node
    cwd: E:/Document/Ars/Memoria/server
    command: npm run dev
    # 既存 start-memoria.bat (cd Memoria/server → npm run dev) をウィンドウ無しで起動。
    start_script: E:/Document/Ars/start-memoria.bat
    autostart: false
    health:
      type: http
      url: http://localhost:5180/api/health
      interval_sec: 30
    provides:
      MEMORIA_URL: http://${host}:${port}
    # Tier2: Memoria server が /api/metrics/memory で process.memoryUsage() を晒すので、
    # heap/external 内訳を取得する (Memoria PR #217)。 外形 RSS と併せて leak の真因切り分けに使う。
    memory:
      metrics_url: http://localhost:5180/api/metrics/memory

  - code: anatomia
    name: Anatomia (建築規約オラクル)
    tier: personal
    project_code: anatomia
    component: backend
    port: 4200
    repo: LUDIARS/Anatomia
    runtime: node
    cwd: E:/Document/Ars/Anatomia
    command: node bin/anatomia.mjs web
    # warm サーバは通常 anatomia hook が必要時に spawn し idle 自動終了する。 Excubitor からは
    # ログ tail と任意の手動起動のために登録する (autostart はしない)。
    autostart: false
    health:
      type: http
      url: http://localhost:4200/api/projects
      interval_sec: 30
    # Vestigium JSONL ログ (cache hit/miss・supply/verify)。 Excubitor が spawn 時に
    # VESTIGIUM_LOGS_DIR=E:/Document/Ars/logs を注入し、 Anatomia が <root>/anatomia/ に書く。
    log_path: E:/Document/Ars/logs/anatomia

  - code: concordia
    name: Concordia (AI 協調)
    tier: personal
    project_code: concordia
    component: backend
    # backend は concordia.config.json server.port = 11111 を bind する (loopback)。
    # 旧値 17330 は実体と不一致で health probe が常に落ちていた。
    port: 11111
    repo: LUDIARS/Concordia
    runtime: node
    cwd: E:/Document/Ars/Concordia
    command: npm run dev
    # 既存の start-concordia.bat (Concordia/Lictor/Vestigium を pull → Lictor build → npm run dev)
    # をそのまま「ウィンドウ無し」で起動する。 単純な npm run dev では関連リポ同期/ビルドが漏れる。
    start_script: E:/Document/Ars/start-concordia.bat
    autostart: false
    # Vestigium JSONL ログ (harness gate/supply/intent 等)。 Excubitor は spawn 時に
    # VESTIGIUM_LOGS_DIR=dirname(log_path)=E:/Document/Ars/logs を注入し、 Concordia の Vestigium が
    # <root>/concordia/ に書く → ここを file-tail する。
    log_path: E:/Document/Ars/logs/concordia
    # backend は /health (JSON) を持つので tcp probe ではなく http health で死活判定する。
    # root (/) は build 済み web UI (web/dist) を配信するため、 開いても 404 にならない。
    health:
      type: http
      url: http://localhost:11111/health
      interval_sec: 30
    provides:
      CONCORDIA_URL: http://${host}:${port}

  - code: conciliator
    name: Conciliator (衝突検知)
    tier: personal
    project_code: conciliator
    component: backend
    port: 17340
    repo: LUDIARS/Conciliator
    runtime: node
    cwd: E:/Document/Ars/Conciliator
    command: npm run dev
    autostart: false
    health:
      type: tcp
      interval_sec: 30
    provides:
      CONCILIATOR_URL: http://${host}:${port}

  - code: custos
    name: Custos (リモートテストランナー)
    tier: personal
    project_code: custos
    component: server
    port: 8765
    repo: LUDIARS/Custos
    runtime: dev-process-md
    cwd: E:/Document/Ars/Custos
    autostart: false
    health:
      type: http
      url: http://localhost:8765/health
      interval_sec: 30
    provides:
      CUSTOS_URL: http://${host}:${port}

  # ─────────────── ローカルアプリ (tier: local-app / runtime=app) ───────────────
  # port を持たないネイティブ/デスクトップ製品。 Excubitor は exec を detached spawn
  # して死活 (プロセス生存) を監視し、 Corpus は /api/hub/apps で集約 + 起動する。
  # GUI を勝手に再起動しないよう autostart=false / restart_policy=no が既定。
  # process_match は host プロセススキャンで「Excubitor 外から起動した実体」を検知する image 名。
  - code: hora-app
    name: Hora (デスクトップおじさん)
    tier: local-app
    project_code: hora
    component: app
    repo: LUDIARS/Hora
    runtime: app
    app_kind: tauri
    exec: E:/Document/Ars/Hora/src-tauri/target/release/hora.exe
    cwd: E:/Document/Ars/Hora
    build_command: npm run tauri build
    process_match: hora.exe
    autostart: false
    health:
      type: process
      interval_sec: 30

  - code: quaestor-app
    name: Quaestor (個人会計)
    tier: local-app
    project_code: quaestor
    component: app
    repo: LUDIARS/Quaestor
    runtime: app
    app_kind: tauri
    # src-tauri/Cargo.toml [[bin]] name = "quaestor" → release binary は quaestor.exe
    exec: E:/Document/Ars/Quaestor/src-tauri/target/release/quaestor.exe
    cwd: E:/Document/Ars/Quaestor
    build_command: npm run tauri build
    process_match: quaestor.exe
    autostart: false
    health:
      type: process
      interval_sec: 30
    # Tier2 (heap 内訳) を取りたいサービスは memory.metrics_url を設定する。
    # サービス側は GET <url> → { rss, heapUsed, heapTotal, external, arrayBuffers } (各バイト) を返す。
    # memory:
    #   metrics_url: http://localhost:17400/api/metrics/memory
    #   leak_window_min: 60
    #   leak_threshold_mb_per_hr: 50

  - code: legatus-app
