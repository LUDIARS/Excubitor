  # ─────────────── dev.ps1 ローカル開発サービス群 (設計書 §6.1) ───────────────
  # dev.bat / dev.ps1 が `cd <repo> && npm run dev` で別ウィンドウ起動している
  # 開発サーバを catalog に全登録する。Excubitor が dev.bat を置き換える布石。
  # command は各リポ自身の `npm run dev` に委譲 (内部の concurrently / npm
  # workspace 構成は各リポが持つので Excubitor 側では再現しない)。
  # autostart は当面 false (Excubitor の autostart 検証が済むまで手動起動のまま)。
  # health は port への tcp 接続で liveness を見る (HTTP path は各サービス差異が
  # あるため、 universal に効く tcp probe を既定とする)。

  - code: corpus
    name: Corpus (Hub framework)
    project_code: corpus
    component: server
    port: 5185
    repo: LUDIARS/Corpus
    runtime: node
    cwd: E:/Document/Ars/Corpus
    command: npm run dev
    autostart: false
    health:
      type: tcp
      interval_sec: 30

